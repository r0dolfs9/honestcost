<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HonestCost — Redesign Exploration</title>
<link rel="stylesheet" href="fonts.css" />
<style>
  html, body { margin: 0; padding: 0; background: #ECEAE3; font-family: 'Inter Tight', system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="redesign/design-canvas.jsx"></script>
<script type="text/babel" src="redesign/shared.jsx"></script>
<script type="text/babel" src="redesign/Polestar.jsx"></script>
<script type="text/babel" src="redesign/Studio.jsx"></script>
<script type="text/babel" src="redesign/Cockpit.jsx"></script>

<script type="text/babel" data-presets="react">
  // Wait one tick so the script-loaded JSX files mount their components onto window.
  function App() {
    const { DesignCanvas, DCSection, DCArtboard } = window;
    return (
      <DesignCanvas
        title="HonestCost — Redesign"
        subtitle="Three takes on 'easy-going · techy · car-brand' for the TCO calculator. Drag to reorder, click any board to focus."
      >
        <DCSection id="direction-1" title="01 — Polestar" subtitle="Light · minimal · whitespace · mono numerics. Inspired by Polestar/Porsche configurators.">
          <DCArtboard id="polestar-input" label="Polestar · Input" width={1280} height={1100}>
            <PolestarInput />
          </DCArtboard>
          <DCArtboard id="polestar-results" label="Polestar · Results" width={1280} height={1280}>
            <PolestarResults />
          </DCArtboard>
        </DCSection>

        <DCSection id="direction-2" title="02 — Studio" subtitle="Soft pillowy surfaces, warm off-white, big friendly numerics. Apple Card × Rivian.">
          <DCArtboard id="studio-input" label="Studio · Input" width={1280} height={1180}>
            <StudioInput />
          </DCArtboard>
          <DCArtboard id="studio-results" label="Studio · Results" width={1280} height={1280}>
            <StudioResults />
          </DCArtboard>
        </DCSection>

        <DCSection id="direction-3" title="03 — Cockpit" subtitle="Dark, technical, signal-yellow accent. Linear / Vercel × BMW M dashboard.">
          <DCArtboard id="cockpit-input" label="Cockpit · Input" width={1280} height={1180}>
            <CockpitInput />
          </DCArtboard>
          <DCArtboard id="cockpit-results" label="Cockpit · Results" width={1280} height={1280}>
            <CockpitResults />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  // Wait for all src-loaded babel scripts to register their globals before mounting.
  (function mount() {
    if (!window.DesignCanvas || !window.HC || !window.PolestarInput || !window.StudioInput || !window.CockpitInput) {
      return setTimeout(mount, 50);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  })();
</script>
</body>
</html>
